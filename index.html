<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 to-slate-900 text-white">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-96 text-center space-y-4">

        <h1 class="text-3xl font-bold text-indigo-400">🎯 Guess The Number</h1>

        <p class="text-gray-300">
            I'm thinking of a number between <span class="font-semibold text-indigo-300">0 and 100</span>.
            Can you guess it?
        </p>

        <h2 class="text-lg font-semibold">Your Guess (0-100)</h2>

        <input 
            type="number" 
            id="guess" 
            placeholder="Enter a Number"
            class="w-full p-2 rounded-lg bg-slate-700 text-white border border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-400"
        >

        <p class="text-sm text-gray-400">Enter a number between 0 and 100</p>

        <div class="flex gap-3 justify-center">
            <button 
                id="submit"
                class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-semibold transition duration-300"
            >
                Submit Guess
            </button>

            <button 
                id="newBtn"
                class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg font-semibold transition duration-300"
            >
                New Game
            </button>
        </div>

        <div class="space-y-2 mt-4 text-sm">
            <p id="yourGuess" class="text-indigo-300 font-medium"></p>
            <p id="previousGuess" class="text-yellow-300"></p>
            <p id="result" class="text-green-400 font-semibold"></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
